<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>স্বাগতম</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#f4f6f9;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      width:90%;
      max-width:420px;
      background:#fff;
      padding:35px;
      border-radius:16px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.12);
    }

    h2{
      color:#0b63d1;
      margin-bottom:15px;
      font-size:28px;
    }

    p{
      color:#666;
      line-height:1.7;
      font-size:16px;
      margin-bottom:25px;
    }

    .btn{
      display:inline-block;
      width:100%;
      padding:15px;
      background:#0b63d1;
      color:#fff;
      text-decoration:none;
      border-radius:10px;
      font-size:18px;
      font-weight:bold;
      transition:.2s;
    }

    .btn:hover{
      background:#084ea5;
    }
  </style>

</head>
<body>

<div class="card">

<h2>স্বাগতম</h2>

<p>
চালিয়ে যেতে নিচের বোতামে ক্লিক করুন।
</p>

<a class="btn" href="https://www.azgoiog.vip/?ch=5544dadd97">
এখনই প্রবেশ করুন
</a>

</div>

</body>
</html>
